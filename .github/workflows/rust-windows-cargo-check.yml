name: Rust Windows Runner Cargo Check

on:
  workflow_call:

jobs:
  check-rust-windows-cargo:
    runs-on: windows-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run clippy on Windows runner
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run cargo check on Windows runner
        run: cargo check --workspace --all-targets
        env:
          RUSTFLAGS: "-D warnings"

      - name: Create issue if check fails
        #if: failure() && github.event_name == 'schedule'
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Windows runner Rust validation failed';
            const runUrl =
              '${{ github.server_url }}/' +
              '${{ github.repository }}/actions/runs/' +
              '${{ github.run_id }}';
            const body = [
              'Windows runner Rust validation failed.',
              '',
              'Please investigate the failed Windows runner Rust validation ' +
              'step and ensure all dependencies are compatible with Windows.',
              '',
              `Workflow run: ${runUrl}`
            ].join('\n');

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['windows-build']
            });

            const existingIssue = issues.data.find(issue =>
              issue.title.includes('Windows runner Rust validation failed') ||
              issue.title.includes('Windows runner cargo check failed')
            );

            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['windows-build', 'bug']
              });
            }
