name: Rust Windows Runner Cargo Check

on:
  workflow_call:

jobs:
  check-rust-windows-cargo:
    runs-on: windows-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Cargo workspace
        id: cargo-workspace
        shell: pwsh
        run: |
          if (Test-Path -Path Cargo.toml) {
            "found=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "found=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Setup Rust
        if: steps.cargo-workspace.outputs.found == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        if: steps.cargo-workspace.outputs.found == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        if: steps.cargo-workspace.outputs.found == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        if: steps.cargo-workspace.outputs.found == 'true'
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Skip validation when Cargo.toml is missing
        if: steps.cargo-workspace.outputs.found == 'false'
        run: echo "Skipping Windows Rust validation because no Cargo.toml was found."

      - name: Run clippy on Windows runner
        if: steps.cargo-workspace.outputs.found == 'true'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run cargo check on Windows runner
        if: steps.cargo-workspace.outputs.found == 'true'
        run: cargo check --workspace --all-targets
        env:
          RUSTFLAGS: "-D warnings"

      - name: Create issue if check fails
        #if: failure() && github.event_name == 'schedule'
        if: failure() && steps.cargo-workspace.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Windows runner Rust validation failed';
            const runUrl =
              '${{ github.server_url }}/' +
              '${{ github.repository }}/actions/runs/' +
              '${{ github.run_id }}';
            const body = [
              'Windows runner Rust validation failed.',
              '',
              'Please investigate the failed Windows runner Rust validation ' +
              'step and ensure all dependencies are compatible with Windows.',
              '',
              `Workflow run: ${runUrl}`
            ].join('\n');

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['windows-build']
            });

            const knownTitles = [
              'Windows runner Rust validation failed',
              'Windows runner cargo check failed'
            ];
            const existingIssue = issues.data.find(issue =>
              knownTitles.some(title => issue.title.includes(title))
            );

            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['windows-build', 'bug']
              });
            }
