name: Rust Windows GNU Cross-compilation Check

on:
  workflow_call:

jobs:
  check-rust-windows-gnu:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install MinGW-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Add Windows GNU target
        run: rustup target add x86_64-pc-windows-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-windows-gnu-${{ hashFiles('**/Cargo.lock') }}

      - name: Run clippy for Windows GNU target
        run: cargo clippy --workspace --all-targets --target x86_64-pc-windows-gnu -- -D warnings

      - name: Build for Windows GNU target
        run: cargo build --workspace --all-targets --target x86_64-pc-windows-gnu
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_RUSTFLAGS: "-D warnings"

      - name: Create issue if check fails
        #if: failure() && github.event_name == 'schedule'
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Windows GNU クロスコンパイルチェックが失敗しました';
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const body = [
              '定期実行で Windows GNU クロスコンパイルチェックが失敗しました。',
              '',
              'build または clippy のエラーを確認し、すべての依存関係が Windows と互換性を持つことを確認してください。',
              '',
              `ワークフロー実行: ${runUrl}`
            ].join('\n');

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['windows-build']
            });

            const knownTitles = [
              'Windows GNU クロスコンパイルチェックが失敗しました',
              'Windows GNU cross-compilation check failed'
            ];
            const existingIssue = issues.data.find(issue =>
              knownTitles.some(title => issue.title.includes(title))
            );

            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['windows-build', 'bug']
              });
            }
